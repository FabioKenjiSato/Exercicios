<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Treino - 65kg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        input[type="checkbox"] {
            accent-color: #f97316;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-4 md:p-8 pb-32">

    <div id="barra-macros" class="fixed bottom-0 left-0 w-full bg-gray-950 border-t border-orange-500 p-4 z-50 shadow-2xl flex justify-between items-center px-6 md:px-12 hidden transition-all duration-500">
        <div>
            <p class="text-xs text-gray-400">Tempo Estimado:</p>
            <p class="text-xl font-bold text-orange-400"><span id="total-tempo">0</span> <span class="text-sm">min</span></p>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400">Volume Total do Dia:</p>
            <p class="text-xl font-bold text-green-400"><span id="total-series">0</span><span class="text-sm"> séries</span></p>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-orange-400 mb-1">Tracker de Treino</h1>
        <p class="text-sm text-gray-400 mb-6">Sua rotina completa adaptável com cálculo de volume.</p>

        <div class="bg-gray-800 rounded-xl shadow-lg p-5 mb-6 border-l-4 border-blue-500">
            <label class="block text-sm font-bold text-blue-400 mb-2">1. Selecione o Dia:</label>
            <select id="diaSemana" onchange="atualizarTreino()" class="w-full bg-gray-700 text-white rounded-lg p-3 mb-4 border border-gray-600 focus:outline-none focus:border-blue-500">
                <option value="">Selecione...</option>
                <option value="segunda">Segunda-feira (Upper)</option>
                <option value="terca">Terça-feira (Lower - Pernas Grossas)</option>
                <option value="quarta">Quarta-feira (Core em Casa)</option>
                <option value="quinta">Quinta-feira (Dia do Pedal / Sem Academia)</option>
                <option value="sexta">Sexta-feira (Upper)</option>
                <option value="sabado">Sábado (Lower - Glúteo Foco)</option>
                <option value="domingo">Domingo (Dia de Spacate / Alongamento)</option>
            </select>

            <label class="block text-sm font-bold text-blue-400 mb-2">2. Cardio do Dia:</label>
            <label class="flex items-center cursor-pointer bg-gray-700 p-3 rounded-lg border border-gray-600 hover:border-blue-500 transition">
                <input type="checkbox" id="temPedal" onchange="atualizarTreino()" class="w-6 h-6 rounded border-gray-400">
                <span class="ml-3 text-sm font-bold text-blue-300">🚲 Com Pedal hoje (8km)</span>
            </label>
        </div>

        <div id="area-print" class="bg-gray-800 rounded-xl shadow-lg p-6 border-t-4 border-orange-500 hidden relative mb-6">
            <h2 id="treino-titulo" class="text-xl font-bold text-orange-400 mb-1">...</h2>
            <p id="treino-foco" class="text-xs text-gray-400 mb-4 font-bold">...</p>

            <div id="treino-aviso" class="bg-gray-900 border border-yellow-500 text-yellow-400 text-xs p-3 rounded mb-5 hidden font-bold">
                ...
            </div>

            <ul id="treino-lista" class="space-y-3 text-sm">
                </ul>

            <div id="assinatura-imagem" class="hidden mt-8 text-center text-xs text-gray-500 border-t border-gray-700 pt-4">
                Rotina Diária Concluída | Meta: 65kg
            </div>
        </div>

        <div id="area-botao" class="hidden mt-6 mb-12 transition-all duration-500 opacity-0 transform translate-y-4">
            <button onclick="salvarImagem()" class="w-full bg-green-500 text-gray-900 font-extrabold py-4 rounded-lg shadow-lg hover:bg-green-400 transition flex justify-center items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                Dia Finalizado! Salvar Imagem
            </button>
        </div>

    </div>

    <script>
        // CONFIGURAÇÃO: Dias automáticos do Spacate
        const diasDeSpacate = ["quarta", "domingo"]; 

        // 1. Matinal (Sempre aparece) - [Séries pra somar, Minutos pra somar]
        const rotinaMatinal = [
            { id: "mat1", nome: "Espreguiçar e Rotação de Pescoço", series: "1 minuto", macroS: 0, macroT: 1 },
            { id: "mat2", nome: "Tocar a ponta dos pés (Cadeia Posterior)", series: "2x 30 segundos", macroS: 2, macroT: 2 },
            { id: "mat3", nome: "Alongamento Panturrilha na parede", series: "2x 30 segundos", macroS: 2, macroT: 2 }
        ];

        // 2. Aquecimento Pré-Treino
        const aquecimentoPadrao = [
            { id: "aq1", nome: "Rotação de Ombros (Frente/Trás)", series: "2x 20 repetições", macroS: 2, macroT: 2 },
            { id: "aq2", nome: "Rotação de Tronco", series: "2x 20 repetições", macroS: 2, macroT: 2 },
            { id: "aq3", nome: "Agachamento Profundo sem peso", series: "2x 15 repetições", macroS: 2, macroT: 3 }
        ];

        // 3. Treino de Spacate/Abertura
        const rotinaSpacate = [
            { id: "spa1", nome: "Borboleta (Alongamento Virilha)", series: "Isometria 2 minutos", macroS: 1, macroT: 2 },
            { id: "spa2", nome: "Posição do Sapo (Frog Stretch)", series: "Isometria 2 minutos", macroS: 1, macroT: 2 },
            { id: "spa3", nome: "Abertura Frontal", series: "1 min cada perna", macroS: 2, macroT: 3 },
            { id: "spa4", nome: "Abertura Lateral (Spacate)", series: "Máximo possível (2 min)", macroS: 1, macroT: 2 }
        ];

        // 4. Treinos de Musculação com a matemática embutida
        const dbTreinos = {
            "segunda": {
                titulo: "Segunda: Upper",
                foco: "V-Taper e Costas.",
                getExercicios: (pedal) => [
                    { id: "seg1", nome: "Puxada Frontal Alta", series: "4x 10-12", macroS: 4, macroT: 10 },
                    { id: "seg2", nome: "Remada Curvada com Halteres", series: "4x 10-12", macroS: 4, macroT: 10 },
                    { id: "seg3", nome: "Supino Inclinado com Halteres", series: "4x 10-12", macroS: 4, macroT: 10 },
                    { id: "seg4", nome: "Elevação Lateral", series: "4x 12-15", macroS: 4, macroT: 8 },
                    { id: "seg5", nome: "Tríceps Pulley", series: "4x 12-15", macroS: 4, macroT: 8 }
                ],
                aviso: (pedal) => "" 
            },
            "terca": {
                titulo: "Terça: Lower (Pernas Grossas)",
                foco: "Foco pesado no quadríceps.",
                getExercicios: (pedal) => {
                    let seriesHack = pedal ? "3x 8-10 (Carga Moderada)" : "4x 6-8 (Carga Máxima!)";
                    let macroHackS = pedal ? 3 : 4;
                    let macroHackT = pedal ? 8 : 12; // Carga máxima exige mais descanso
                    
                    let seriesLeg = pedal ? "3x 8-12 (Carga Moderada)" : "4x 8-12 (Força)";
                    let macroLegS = pedal ? 3 : 4;
                    let macroLegT = pedal ? 8 : 12;

                    return [
                        { id: "ter1", nome: "Agachamento Hack", series: seriesHack, macroS: macroHackS, macroT: macroHackT },
                        { id: "ter2", nome: "Leg press", series: seriesLeg, macroS: macroLegS, macroT: macroLegT },
                        { id: "ter3", nome: "Bulgarian split squat", series: "3x 8-10", macroS: 3, macroT: 10 },
                        { id: "ter4", nome: "Stiff com halteres", series: "3x 8-12", macroS: 3, macroT: 8 },
                        { id: "ter5", nome: "Panturrilha", series: "3x 12-15", macroS: 3, macroT: 6 }
                    ];
                },
                aviso: (pedal) => pedal ? "⚠️ Volume do Hack e Leg Press reduzido hoje para poupar as pernas do pedal!" : "🔥 Sem pedal hoje! Pode colocar carga máxima e descer tudo no Hack!"
            },
            "quarta": {
                titulo: "Quarta: Core",
                foco: "Tummy Toner (Em Casa).",
                getExercicios: (pedal) => [
                    { id: "qua1", nome: "Prancha Isométrica", series: "4x 1 minuto", macroS: 4, macroT: 6 },
                    { id: "qua2", nome: "Hanging Leg Raises", series: "4x 12-15", macroS: 4, macroT: 8 },
                    { id: "qua3", nome: "Abdominal Supra", series: "4x 15-20", macroS: 4, macroT: 6 },
                    { id: "qua4", nome: "Vacuum", series: "5x 10 seg", macroS: 5, macroT: 3 }
                ],
                aviso: (pedal) => ""
            },
            "quinta": {
                titulo: "Quinta: Dia do Pedal",
                foco: "Sem Musculação.",
                getExercicios: (pedal) => {
                    let ex = [];
                    if(pedal) ex.push({ id: "qui1", nome: "Pedal Constante (8km+)", series: "Cardio do dia", macroS: 0, macroT: 40 });
                    return ex;
                },
                aviso: (pedal) => pedal ? "🚲 Hoje é só girar as pernas para faculdade/trabalho e recuperar o músculo." : ""
            },
            "sexta": {
                titulo: "Sexta: Upper",
                foco: "Costas, Ombros e Braços.",
                getExercicios: (pedal) => {
                    let ex = [
                        { id: "sex1", nome: "Barra Fixa / Graviton", series: "4x Até a falha", macroS: 4, macroT: 10 },
                        { id: "sex2", nome: "Desenvolvimento Ombro", series: "4x 10-12", macroS: 4, macroT: 10 },
                        { id: "sex3", nome: "Elevação Lateral", series: "4x 12-15", macroS: 4, macroT: 8 },
                        { id: "sex4", nome: "Rosca Direta", series: "4x 10-12", macroS: 4, macroT: 8 }
                    ];
                    if(!pedal) {
                        ex.push({ id: "sex5", nome: "Escada (Cardio de Compensação)", series: "20 a 25 min", macroS: 0, macroT: 25 });
                    }
                    return ex;
                },
                aviso: (pedal) => !pedal ? "⚠️ O sistema injetou Escada no final do treino porque você não andou de pedal hoje!" : "✅ O pedal já cobriu seu cardio diário. Faça só os ferros."
            },
            "sabado": {
                titulo: "Sábado: Lower (Big Butt)",
                foco: "Glúteo Foco.",
                getExercicios: (pedal) => [
                    { id: "sab1", nome: "Hip thrust", series: "4x 6-10", macroS: 4, macroT: 12 },
                    { id: "sab2", nome: "Stiff", series: "3x 8-12", macroS: 3, macroT: 8 },
                    { id: "sab3", nome: "Leg press pés altos", series: "3x 10-12", macroS: 3, macroT: 10 },
                    { id: "sab4", nome: "Bulgarian leve", series: "3x 12", macroS: 3, macroT: 8 },
                    { id: "sab5", nome: "Glute bridge isométrico", series: "Até a falha", macroS: 3, macroT: 5 }
                ],
                aviso: (pedal) => ""
            },
            "domingo": {
                titulo: "Domingo: Apenas Alongamento",
                foco: "Dia focado na mobilidade e descanso da musculação.",
                getExercicios: (pedal) => [],
                aviso: (pedal) => "🧘 Dia sagrado do descanso da força. Destrave as pernas e a coluna."
            }
        };

        function atualizarTreino() {
            const dia = document.getElementById('diaSemana').value;
            const pedal = document.getElementById('temPedal').checked;
            
            const areaPrint = document.getElementById('area-print');
            const areaBotao = document.getElementById('area-botao');
            const barraMacros = document.getElementById('barra-macros');
            
            if(!dia) {
                areaPrint.classList.add('hidden');
                areaBotao.classList.add('hidden');
                barraMacros.classList.add('hidden');
                return;
            }

            const dados = dbTreinos[dia];
            const exerciciosForca = dados.getExercicios(pedal);
            const avisoTexto = dados.aviso(pedal);
            const ehDiaDeSpacate = diasDeSpacate.includes(dia);

            document.getElementById('treino-titulo').innerText = dados.titulo;
            document.getElementById('treino-foco').innerText = dados.foco;

            // Restaura o Alerta Amarelo do App Original
            const avisoDiv = document.getElementById('treino-aviso');
            if(avisoTexto !== "") {
                avisoDiv.innerText = avisoTexto;
                avisoDiv.classList.remove('hidden');
            } else {
                avisoDiv.classList.add('hidden');
            }

            const lista = document.getElementById('treino-lista');
            lista.innerHTML = '';
            
            let varTotalSeries = 0;
            let varTotalTempo = 0;

            // 1. BLOCO: ALONGAMENTO MATINAL
            lista.innerHTML += `<div class="text-yellow-400 font-bold mb-2 mt-2 text-xs uppercase tracking-wider">🌅 Alongamento Matinal</div>`;
            rotinaMatinal.forEach(ex => {
                lista.innerHTML += criarItemCheckbox(ex);
                varTotalSeries += ex.macroS; varTotalTempo += ex.macroT;
            });

            // 2. BLOCO: AQUECIMENTO PRÉ-TREINO
            if(dia !== "domingo" && dia !== "quinta") {
                lista.innerHTML += `<div class="text-blue-400 font-bold mb-2 mt-6 text-xs uppercase tracking-wider">🏋️ Aquecimento Pré-Treino</div>`;
                aquecimentoPadrao.forEach(ex => {
                    lista.innerHTML += criarItemCheckbox(ex);
                    varTotalSeries += ex.macroS; varTotalTempo += ex.macroT;
                });
            }

            // 3. BLOCO: TREINO DO DIA
            if(exerciciosForca.length > 0) {
                let tituloTreino = (dia === "quinta") ? "🚴 Cardio Diário" : "🔥 Treino de Força";
                lista.innerHTML += `<div class="text-orange-400 font-bold mb-2 mt-6 text-xs uppercase tracking-wider">${tituloTreino}</div>`;
                exerciciosForca.forEach(ex => {
                    lista.innerHTML += criarItemCheckbox(ex);
                    varTotalSeries += ex.macroS; varTotalTempo += ex.macroT;
                });
            }

            // 4. BLOCO: SPACATE
            if(ehDiaDeSpacate) {
                lista.innerHTML += `
                <div class="bg-yellow-900 border-l-4 border-yellow-500 p-3 mt-8 mb-4 rounded shadow-md">
                    <p class="text-yellow-400 text-sm font-extrabold">📌 Lembrete!</p>
                    <p class="text-yellow-200 text-xs">Hoje é dia de focar na abertura pélvica. Vá no seu limite sem forçar lesões.</p>
                </div>
                `;
                lista.innerHTML += `<div class="text-yellow-500 font-bold mb-2 text-xs uppercase tracking-wider">🤸 Treino de Spacate / Abertura</div>`;
                rotinaSpacate.forEach(ex => {
                    lista.innerHTML += criarItemCheckbox(ex);
                    varTotalSeries += ex.macroS; varTotalTempo += ex.macroT;
                });
            }

            // Atualiza Calculadora no Rodapé
            document.getElementById('total-tempo').innerText = varTotalTempo;
            document.getElementById('total-series').innerText = varTotalSeries;

            areaPrint.classList.remove('hidden');
            barraMacros.classList.remove('hidden');
            areaBotao.classList.add('hidden', 'opacity-0', 'translate-y-4');
            
            verificarConclusao();
        }

        function criarItemCheckbox(ex) {
            return `
                <li class="flex items-center bg-gray-900 p-3 rounded-lg border border-gray-700 hover:border-gray-500 transition shadow-sm">
                    <input type="checkbox" id="check-${ex.id}" onchange="marcarConcluido('${ex.id}')" class="ex-checkbox w-6 h-6 rounded mr-4">
                    <div id="text-${ex.id}" class="transition-all duration-300">
                        <p class="text-gray-200 font-bold text-sm leading-tight">${ex.nome}</p>
                        <p class="text-orange-400 font-semibold text-xs mt-1">${ex.series}</p>
                    </div>
                </li>
            `;
        }

        function marcarConcluido(id) {
            const box = document.getElementById(`check-${id}`);
            const textDiv = document.getElementById(`text-${id}`);

            if(box.checked) {
                textDiv.classList.add('line-through', 'opacity-50');
            } else {
                textDiv.classList.remove('line-through', 'opacity-50');
            }
            verificarConclusao();
        }

        function verificarConclusao() {
            const checkboxes = document.querySelectorAll('.ex-checkbox');
            const areaBotao = document.getElementById('area-botao');
            
            if(checkboxes.length === 0) return;

            let todosMarcados = true;
            checkboxes.forEach(box => {
                if(!box.checked) todosMarcados = false;
            });

            if(todosMarcados) {
                areaBotao.classList.remove('hidden');
                setTimeout(() => {
                    areaBotao.classList.remove('opacity-0', 'translate-y-4');
                }, 50);
            } else {
                areaBotao.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => {
                    areaBotao.classList.add('hidden');
                }, 300);
            }
        }

        function salvarImagem() {
            const areaPrint = document.getElementById('area-print');
            const assinatura = document.getElementById('assinatura-imagem');
            
            const divsTexto = document.querySelectorAll('[id^="text-"]');
            divsTexto.forEach(div => div.classList.remove('line-through', 'opacity-50'));
            
            assinatura.classList.remove('hidden');

            html2canvas(areaPrint, {
                backgroundColor: "#1f2937",
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Tracker-${document.getElementById('diaSemana').value}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                assinatura.classList.add('hidden');
                divsTexto.forEach(div => div.classList.add('line-through', 'opacity-50'));
            });
        }
    </script>
</body>
</html>
